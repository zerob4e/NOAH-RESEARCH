<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H40N - N.ROOT</title>

<style>

body{
background:#0a0a0a;
margin:0;
font-family:monospace;
color:#e5e5e5;
}

/* TERMINAL */

.terminal-wrapper{
width:90%;
max-width:1200px;
margin:40px auto;
border:1px solid #333;
border-radius:8px;
overflow:hidden;
background:#111;
box-shadow:0 0 20px rgba(0,0,0,.6);
}

.terminal-header{
background:#1a1a1a;
padding:10px;
border-bottom:1px solid #333;
display:flex;
align-items:center;
gap:10px;
}

.dot{width:12px;height:12px;border-radius:50%;}
.red{background:#ff5f56;cursor:pointer;}
.yellow{background:#ffbd2e;}
.green{background:#27c93f;}

.terminal-title{
flex:1;
text-align:center;
opacity:.7;
}

/* GRID */

#main-grid{
display:flex;
height:80vh;
}

/* SIDEBAR */

#sidebar{
width:260px;
border-right:1px solid #333;
padding:15px;
background:#111;
}

.sidebar-title{
font-size:12px;
opacity:.6;
margin-bottom:10px;
letter-spacing:1px;
}

.folder{
padding:8px;
border-radius:6px;
cursor:pointer;
margin-bottom:6px;
background:#161616;
border:1px solid #222;
}

.folder:hover{
background:#222;
}

/* FILE LIST */

#file-area{
flex:1;
padding:20px;
display:flex;
flex-direction:column;
gap:10px;
overflow:auto;
}

.file{
background:#161616;
border:1px solid #222;
padding:10px;
border-radius:6px;
cursor:pointer;
}

.file:hover{
background:#222;
}

/* VIEWER */

#viewerOverlay{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.8);
z-index:999;
}

.viewer-window{
width:90%;
height:90%;
margin:30px auto;
background:#111;
border:1px solid #333;
border-radius:8px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.viewer-header{
background:#1a1a1a;
padding:10px;
display:flex;
align-items:center;
gap:10px;
border-bottom:1px solid #333;
}

#viewerFrame{
flex:1;
border:none;
background:#111;
}

</style>
</head>

<body>

<div class="terminal-wrapper">

<div class="terminal-header">
<div class="dot red" onclick="closeViewer()"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
<div class="terminal-title">NOAH RESEARCH TERMINAL — PUBLIC ARCHIVE</div>
</div>

<div id="main-grid">

<div id="sidebar">

<div class="sidebar-title">ARQUIVOS</div>

<div class="folder" onclick="openFolder('demologia')">📁 Demologia</div>
<div class="folder" onclick="openFolder('relatorios')">📁 Relatórios</div>
<div class="folder" onclick="openFolder('registros')">📁 Registros H40N</div>

</div>

<div id="file-area">
Selecione uma pasta para acessar os arquivos.
</div>

</div>
</div>

<!-- VIEWER -->

<div id="viewerOverlay">

<div class="viewer-window">

<div class="viewer-header">
<div class="dot red" onclick="closeViewer()"></div>
<div class="dot yellow"></div>
<div class="dot green"></div>
<div class="terminal-title">VISUALIZANDO ARQUIVO</div>
</div>

<iframe id="viewerFrame"></iframe>

</div>
</div>

<script>

const files = {

demologia: [
{name:"origem quinn",path:"files/demologia/origem_quinn.jpg"},
{name:"trajetoria nkt - quinn",path:"files/demologia/trajetoria_nkt-quinn.jpg"},
{name:"culpa",path:"files/demologia/culpa_lurdes.jpg"},
{name:"kai",path:"files/demologia/video_kai.jpg"},
{name:"linhagem",path:"files/demologia/linhagem_asuna.jpg"},
],

relatorios: [
{name:"relatorio amanecer",path:"files/relatorios/arq-amanecer_relatorio.html"},
{name:"relatorio kitsune",path:"files/relatorios/arq-kitsune_relatorio.html"},
{name:"relatorio h40n",path:"files/relatorios/arq-noah_operador.html"},
],

ech0: [
{name:"caso ech0",path:"files/ech0/caso_lurdes.html"},
{name:"registro",path:"files/ech0/lurdes.jpeg"}
],

registros: [
{name:"blueprint",path:"files/registros/arq-amanecer_experimento.html"},
{name:"h40n thoughts",path:"files/registros/arq-noah_thoughts.html"}
]

}

function openFolder(folder){

const area=document.getElementById("file-area")
area.innerHTML=""

files[folder].forEach(file=>{

const div=document.createElement("div")
div.className="file"
div.innerText=file.name
div.onclick=()=>openFile(file.path)

area.appendChild(div)

})

}

function openFile(path){

const viewer=document.getElementById("viewerOverlay")
const frame=document.getElementById("viewerFrame")

if(path.match(/\.(jpg|jpeg|png|gif)$/i)){

frame.srcdoc=`
<html>
<body style="
margin:0;
background:#111;
">

<img src="${path}" style="
width:100%;
height:auto;
display:block;
">

</body>
</html>
`

}else{

frame.src=path

}

viewer.style.display="block"

}

function closeViewer(){

document.getElementById("viewerOverlay").style.display="none"
document.getElementById("viewerFrame").src=""

}

</script>

</body>
</html>
